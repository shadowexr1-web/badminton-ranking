<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5RBC Badminton Club Rankings</title>
    <!-- Google Fonts: Inter untuk tulisan nipis & premium ala BWF -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#f4f6f9] text-slate-900 min-h-screen font-light">

    <!-- Top Bar BWF Corporate Blue -->
    <header class="bg-[#002060] text-white shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <!-- KOTAK LOGO KELAB: Menghubungkan ke logo.png di GitHub -->
                <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center p-1 shadow-inner overflow-hidden shrink-0">
                    <img src="logo.png.PNG" alt="🏸" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" class="w-full h-full object-contain">
                    <span class="text-2xl hidden">🏸</span>
                </div>
                <div>
                    <h1 class="text-lg font-extrabold tracking-wider uppercase">OFFICIAL 5RBC RANKINGS</h1>
                    <p class="text-[10px] text-blue-200 uppercase tracking-widest font-normal">Inspired by BWF World Rankings</p>
                </div>
            </div>
            <div class="text-xs bg-[#00143a] px-3 py-1.5 rounded border border-blue-900/50 text-slate-300 font-normal">
                Last Updated: <span class="text-white font-semibold" id="update-date">-</span>
            </div>
        </div>
    </header>

    <!-- Main Section -->
    <main class="max-w-6xl mx-auto px-4 py-8">
        
        <!-- Header Kategori Tetap (Sebab semua main double) -->
        <div class="border-b border-slate-200 pb-3 mb-6 flex justify-between items-center">
            <h2 class="text-xl font-extrabold text-[#002060] uppercase tracking-tight">Men's Doubles Standings</h2>
            <span class="text-xs text-slate-400 font-normal">6 Active Players</span>
        </div>

        <!-- Ranking Table Container -->
        <div class="bg-white rounded border border-slate-200 shadow-xs overflow-x-auto">
            <table class="w-full text-left border-collapse min-w-[600px]">
                <thead>
                    <tr class="bg-[#002060] text-white text-[11px] uppercase tracking-widest border-b border-blue-950 font-semibold">
                        <th class="py-3 px-4 text-center w-20 font-semibold">Rank</th>
                        <th class="py-3 px-4 font-semibold">Pair Name</th>
                        <th class="py-3 px-4 text-center w-32 font-semibold">Tournaments</th>
                        <th class="py-3 px-4 text-center w-36 font-semibold">Points</th>
                        <th class="py-3 px-4 text-center w-32 font-semibold">Recent Form</th>
                    </tr>
                </thead>
                <tbody id="ranking-table" class="divide-y divide-slate-100 text-sm">
                    <!-- Data masuk guna JS -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- PLAYER PROFILE MODAL (Pop-up Rahsia) -->
    <div id="profile-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-xs flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-lg max-w-sm w-full border border-slate-200 shadow-xl overflow-hidden">
            <div class="bg-[#002060] text-white p-4 flex justify-between items-center">
                <h3 class="font-extrabold text-base uppercase tracking-wider">Pair Info</h3>
                <button onclick="closeModal()" class="text-white hover:text-slate-300 text-xl font-bold cursor-pointer">&times;</button>
            </div>
            <div class="p-5 space-y-3 text-slate-700">
                <p class="text-lg font-extrabold text-[#002060]" id="modal-name">-</p>
                <div class="border-t border-slate-100 pt-3 grid grid-cols-2 gap-2 text-xs">
                    <span class="text-slate-400 font-normal">Team Code:</span> <span class="font-semibold text-slate-800" id="modal-code">5RBC-TEAM</span>
                    <span class="text-slate-400 font-normal">Status:</span> <span class="font-semibold text-slate-800" id="modal-status">-</span>
                </div>
            </div>
            <div class="bg-slate-50 px-4 py-3 text-right border-t border-slate-100">
                <button onclick="closeModal()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 text-xs font-bold px-4 py-2 rounded cursor-pointer">Close</button>
            </div>
        </div>
    </div>

    <script>
        let globalData = [];

        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('update-date').innerText = new Date().toLocaleDateString('ms-MY', options);

        // Terus load data dari JSON
        fetch('players.json')
            .then(response => response.json())
            .then(data => {
                // Sini kita terus ambik data 'mens_doubles' sahaja
                globalData = data.mens_doubles || [];
                renderTable();
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('ranking-table').innerHTML = `<tr><td colspan="5" class="py-8 text-center text-red-500 font-semibold">Gagal memuatkan data.</td></tr>`;
            });

        function renderTable() {
            const tableBody = document.getElementById('ranking-table');
            tableBody.innerHTML = '';

            // Susun points tertinggi ke terendah
            globalData.sort((a, b) => b.points - a.points);

            if (globalData.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="py-8 text-center text-slate-400">Tiada data gandingan double.</td></tr>`;
                return;
            }

            globalData.forEach((player, index) => {
                const rank = index + 1;
                
                let rankBox = `<span class="bg-[#002060] text-white font-semibold text-xs px-2 py-1 rounded inline-block w-7 text-center">${rank}</span>`;
                if (rank > 3) {
                    rankBox = `<span class="text-slate-400 font-normal px-2">${rank}</span>`;
                }

                const row = `
                    <tr class="hover:bg-slate-50/80 transition duration-100">
                        <td class="py-3 px-4 text-center">${rankBox}</td>
                        <td class="py-3 px-4">
                            <button onclick="openProfile(${index})" class="font-semibold text-slate-800 hover:text-blue-600 hover:underline transition text-left cursor-pointer">
                                ${player.name}
                            </button>
                        </td>
                        <td class="py-3 px-4 text-center text-slate-500 font-normal">${player.tournaments}</td>
                        <td class="py-3 px-4 text-center text-blue-600 font-semibold font-mono">
                            ${player.points.toLocaleString()}
                        </td>
                        <td class="py-3 px-4 text-center tracking-wide">${player.form}</td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        }

        function openProfile(index) {
            const player = globalData[index];
            document.getElementById('modal-name').innerText = player.name;
            document.getElementById('modal-status').innerText = player.status || 'Active';
            document.getElementById('profile-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('profile-modal').classList.add('hidden');
        }
    </script>
</body>
</html>
